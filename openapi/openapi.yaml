openapi: 3.1.0

info:
  title: Parmana Trust Core API
  version: 0.3.0
  description: >
    Parmana verifies human-defined authority before execution.

servers:
  - url: http://localhost:3000

tags:
  - name: Authority
  - name: Attestation
  - name: Verification
  - name: Execution
  - name: Transparency
  - name: Trust Roots
  - name: Invariants

paths:

  /evaluate:
    post:
      tags:
        - Authority
      operationId: evaluateAuthority
      summary: Evaluate authority
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluateRequest'
      responses:
        '200':
          description: Authority decision

  /attest:
    post:
      tags:
        - Attestation
      operationId: createAttestation
      summary: Create attestation
      responses:
        '200':
          description: Attestation created

  /verify:
    post:
      tags:
        - Verification
      operationId: verifyDecision
      summary: Verify attestation
      responses:
        '200':
          description: Verification receipt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationReceipt'

  /execute:
    post:
      tags:
        - Execution
      operationId: executeDecision
      summary: Record execution
      responses:
        '200':
          description: Execution recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionRecord'

  /execution/{executionId}:
    get:
      tags:
        - Execution
      operationId: getExecution
      summary: Retrieve execution record
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Execution record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionRecord'

  /health:
    get:
      tags:
        - Invariants
      operationId: healthCheck
      summary: Health check
      responses:
        '200':
          description: OK

  /version:
    get:
      tags:
        - Invariants
      operationId: getVersion
      summary: Version
      responses:
        '200':
          description: Version info

components:

  schemas:

    EvaluateRequest:
      type: object
      required:
        - subjectId
        - taskId
      properties:
        subjectId:
          type: string
        taskId:
          type: string
        signals:
          type: object
          additionalProperties: true

    Attestation:
      type: object
      required:
        - decisionId
        - subjectId
        - taskId
        - policyId
        - policyVersion
      properties:
        decisionId:
          type: string
        subjectId:
          type: string
        taskId:
          type: string
        policyId:
          type: string
        policyVersion:
          type: string

    VerificationReceipt:
      type: object
      required:
        - receiptId
        - subjectId
        - decisionId
        - taskId
      properties:
        receiptId:
          type: string
        subjectId:
          type: string
        decisionId:
          type: string
        taskId:
          type: string
        valid:
          type: boolean

    ExecutionRecord:
      type: object
      required:
        - executionId
        - subjectId
        - decisionId
        - receiptId
      properties:
        executionId:
          type: string
        subjectId:
          type: string
        decisionId:
          type: string
        receiptId:
          type: string
        executionSystem:
          type: string
        executionReference:
          type: string
        executionStatus:
          type: string