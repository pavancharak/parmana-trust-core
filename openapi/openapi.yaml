openapi: 3.1.0

info:
  title: Parmana Trust Core API
  version: 0.1.0
  description: >
    Parmana evaluates trusted signals against policy before execution.
    Every decision becomes attestable, verifiable, auditable,
    and transparently published.

servers:
  - url: http://localhost:3000

tags:
  - name: Authority
  - name: Attestation
  - name: Verification
  - name: Transparency
  - name: Trust Roots
  - name: Invariants

paths:

  /evaluate:
    post:
      tags:
        - Authority
      operationId: evaluateTask
      summary: Evaluate a task against policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluateRequest'
      responses:
        '200':
          description: Evaluation result

  /attest:
    post:
      tags:
        - Attestation
      operationId: createAttestation
      summary: Create attestation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluateRequest'
      responses:
        '200':
          description: Attestation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attestation'

  /verify-attestation:
    post:
      tags:
        - Verification
      operationId: verifyAttestation
      summary: Verify attestation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Attestation'
      responses:
        '200':
          description: Verification result

  /receipt:
    post:
      tags:
        - Verification
      operationId: createReceipt
      summary: Generate verification receipt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Attestation'
      responses:
        '200':
          description: Verification receipt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationReceipt'

  /transparency:
    post:
      tags:
        - Transparency
      operationId: appendTransparencyEntry
      summary: Append transparency entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransparencyRequest'
      responses:
        '200':
          description: Transparency entry created

  /transparency/{receiptId}:
    get:
      tags:
        - Transparency
      operationId: getTransparencyEntry
      summary: Get transparency entry
      parameters:
        - name: receiptId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transparency entry

  /transparency/proof/{receiptId}:
    get:
      tags:
        - Transparency
      operationId: getTransparencyProof
      summary: Get transparency proof
      parameters:
        - name: receiptId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Inclusion proof

  /trust-root/current:
    get:
      tags:
        - Trust Roots
      operationId: getCurrentTrustRoot
      summary: Get current trust root
      responses:
        '200':
          description: Current trust root
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustRoot'

  /trust-root/publish:
    post:
      tags:
        - Trust Roots
      operationId: publishTrustRoot
      summary: Publish trust root
      responses:
        '200':
          description: Published trust root
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustRoot'

  /invariants:
    get:
      tags:
        - Invariants
      operationId: listInvariants
      summary: List all Trust Core invariants
      responses:
        '200':
          description: Invariant registry

  /invariants/{id}:
    get:
      tags:
        - Invariants
      operationId: getInvariant
      summary: Get invariant by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invariant definition
        '404':
          description: Invariant not found

components:

  schemas:

    EvaluateRequest:
      type: object
      required:
        - task
      properties:
        task:
          type: string
        signals:
          type: object

    Attestation:
      type: object
      properties:
        schemaVersion:
          type: string
        decisionId:
          type: string
        taskId:
          type: string
        policyId:
          type: string
        policyVersion:
          type: string
        evidence:
          type: array
          items:
            type: object
        signatures:
          type: object
        metadata:
          type: object
        outcome:
          type: object

    VerificationReceipt:
      type: object
      properties:
        receiptId:
          type: string
        decisionId:
          type: string
        valid:
          type: boolean
        verifiedAlgorithms:
          type: array
          items:
            type: string
        failedAlgorithms:
          type: array
          items:
            type: string
        verifiedAt:
          type: string
          format: date-time
        receiptHash:
          type: string

    TransparencyRequest:
      type: object
      required:
        - receiptId
        - receiptHash
      properties:
        receiptId:
          type: string
        receiptHash:
          type: string

    TrustRoot:
      type: object
      properties:
        rootId:
          type: string
        algorithm:
          type: string
        receiptCount:
          type: integer
        rootHash:
          type: string
        publishedAt:
          type: string
          format: date-timeopenapi: 3.1.0

